<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}World Cup Squad Advisor{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/app.css') }}">
</head>
<body>
    <header class="app-header">
        <div class="app-shell header-inner">
            <div class="brand-wrap">
                <div class="brand">World Cup Squad Advisor Lab</div>
                <div class="brand-subtitle">Entity-first football intelligence workbench</div>
            </div>
            <nav class="nav">
                <a class="nav-link" href="/">Dashboard</a>
                <a class="nav-link" href="/teams">Teams</a>
                <a class="nav-link" href="/players">Players</a>
                <a class="nav-link" href="/compare">Compare</a>
                <a class="nav-link" href="/advisor">Advisor</a>
            </nav>
        </div>
    </header>

    <main class="app-shell page-body">
        <section class="page-head">
            <h1>{% block page_title %}{{ page_title }}{% endblock %}</h1>
            <p>{% block page_subtitle %}{{ subtitle }}{% endblock %}</p>
        </section>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
